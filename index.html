<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Torque Lab — Từ điển chuyên ngành ô tô</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0f12;--bg2:#13161b;--bg3:#1a1e25;--bg4:#21262f;
  --border:#2a303a;--border2:#353d4a;
  --text:#e8ecf0;--muted:#7a8494;--dim:#4a5260;
  --green:#00d97e;--green2:#00a85f;--green-bg:rgba(0,217,126,0.08);
  --amber:#f5a623;--amber-bg:rgba(245,166,35,0.08);
  --blue:#4da6ff;--blue-bg:rgba(77,166,255,0.08);
  --red:#ff5c5c;
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;line-height:1.6}
button,input,select{font-family:'Sora',sans-serif}

/* HEADER */
.header{border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.header-inner{max-width:1100px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:16px}
.logo{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--green);letter-spacing:-0.5px;white-space:nowrap}
.logo span{color:var(--muted)}
.header-stats{display:flex;gap:12px;margin-left:auto;align-items:center}
.hstat{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.hstat b{color:var(--text)}
.prog-wrap{width:100px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .5s}

/* NAV TABS */
.nav{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99}
.nav-inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;gap:4px;overflow-x:auto}
.nav-tab{padding:12px 18px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-family:'Sora',sans-serif}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--green);border-bottom-color:var(--green)}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:24px 20px}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 40px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;outline:none;transition:border .2s}
.search-wrap input::placeholder{color:var(--dim)}
.search-wrap input:focus{border-color:var(--border2)}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:15px}
.mode-btns{display:flex;gap:6px}
.mode-btn{padding:10px 16px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;background:transparent;color:var(--muted);transition:all .2s;white-space:nowrap}
.mode-btn:hover{border-color:var(--border2);color:var(--text)}
.mode-btn.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}

/* CAT CHIPS */
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.cat{padding:5px 12px;font-size:11px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;font-family:'DM Mono',monospace}
.cat:hover{border-color:var(--border2);color:var(--text)}
.cat.active{background:var(--blue-bg);border-color:var(--blue);color:var(--blue)}

/* WORD GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card.learned{border-left:3px solid var(--green)}
.card.starred{border-left:3px solid var(--amber)}
.card-en{font-size:15px;font-weight:500;color:var(--text);margin-bottom:4px;font-family:'DM Mono',monospace}
.card-vi{font-size:13px;color:var(--muted);margin-bottom:8px}
.card-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:6px;background:var(--bg4);color:var(--dim);font-family:'DM Mono',monospace;margin-bottom:8px}
.card-actions{display:flex;gap:6px;opacity:0;transition:opacity .2s}
.card:hover .card-actions{opacity:1}
.card-btn{padding:4px 10px;font-size:11px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s}
.card-btn:hover{background:var(--bg4);color:var(--text)}
.card-btn.s-active{color:var(--amber);border-color:var(--amber)}
.card-btn.l-active{color:var(--green);border-color:var(--green)}
.card-badge{position:absolute;top:10px;right:10px;font-size:10px;padding:2px 7px;border-radius:5px;font-family:'DM Mono',monospace}
.badge-l{background:var(--green-bg);color:var(--green)}
.badge-s{background:var(--amber-bg);color:var(--amber)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}

/* PAGER */
.pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:24px}
.pager button{padding:6px 14px;font-size:12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.pager button:hover:not(:disabled){background:var(--bg3);color:var(--text)}
.pager button:disabled{opacity:0.3;cursor:default}
.pager span{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace}

/* FLASHCARD MODE */
.flash-wrap{display:flex;flex-direction:column;align-items:center;gap:24px}
.flash-card{width:100%;max-width:500px;min-height:240px;background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px 32px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;perspective:1000px;position:relative}
.flash-card:hover{border-color:var(--border2)}
.flash-front{text-align:center}
.flash-word{font-size:28px;font-weight:600;font-family:'DM Mono',monospace;color:var(--text);margin-bottom:8px}
.flash-cat{font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;padding:3px 10px;border:1px solid var(--border2);border-radius:6px;display:inline-block}
.flash-hint{font-size:12px;color:var(--dim);margin-top:20px}
.flash-back{text-align:center;display:none}
.flash-vi{font-size:22px;font-weight:500;color:var(--green);margin-bottom:10px}
.flash-card.revealed .flash-front{display:none}
.flash-card.revealed .flash-back{display:block}
.flash-controls{display:flex;gap:10px}
.flash-btn{padding:10px 24px;font-size:13px;border-radius:10px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s}
.flash-btn:hover{background:var(--bg3);color:var(--text)}
.flash-btn.know{border-color:var(--green);color:var(--green)}
.flash-btn.know:hover{background:var(--green-bg)}
.flash-btn.skip{border-color:var(--red);color:var(--red)}
.flash-counter{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)}

/* QUIZ MODE */
.quiz-wrap{max-width:580px;margin:0 auto}
.quiz-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.quiz-score-disp{font-family:'DM Mono',monospace;font-size:13px;color:var(--muted)}
.quiz-prog{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;flex:1;margin:0 16px}
.quiz-prog-fill{height:100%;background:var(--green);transition:width .3s}
.quiz-q{font-size:22px;font-weight:500;text-align:center;margin-bottom:8px;font-family:'DM Mono',monospace;color:var(--text)}
.quiz-cat{text-align:center;font-size:11px;color:var(--muted);margin-bottom:28px;font-family:'DM Mono',monospace}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.qchoice{padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:14px;color:var(--muted);transition:all .2s;text-align:left}
.qchoice:hover:not(:disabled){background:var(--bg4);border-color:var(--border2);color:var(--text)}
.qchoice.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.qchoice.wrong{background:rgba(255,92,92,0.08);border-color:var(--red);color:var(--red)}
.quiz-feedback{text-align:center;font-size:13px;color:var(--muted);min-height:24px;margin-bottom:12px}
.quiz-next{width:100%;padding:12px;border:1px solid var(--border2);border-radius:10px;cursor:pointer;background:transparent;color:var(--text);font-size:14px;transition:all .2s;display:none}
.quiz-next:hover{background:var(--bg3)}
.quiz-result{text-align:center;padding:40px;background:var(--bg2);border:1px solid var(--border);border-radius:20px}
.quiz-result h2{font-size:32px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green);margin-bottom:8px}
.quiz-result p{color:var(--muted);margin-bottom:24px}
.quiz-result button{padding:10px 24px;border:1px solid var(--green);border-radius:10px;cursor:pointer;background:var(--green-bg);color:var(--green);font-size:14px}

@media(max-width:600px){
  .quiz-choices{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
  .header-stats{display:none}
  .flash-word{font-size:22px}
}
/* READING MODE */
.read-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.read-cat{padding:5px 12px;font-size:11px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;font-family:'DM Mono',monospace}
.read-cat:hover{border-color:var(--border2);color:var(--text)}
.read-cat.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.article{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:16px}
.article-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.article-tag{font-size:10px;padding:3px 10px;border-radius:6px;background:var(--blue-bg);color:var(--blue);font-family:'DM Mono',monospace;white-space:nowrap;margin-top:3px}
.article-level{font-size:10px;padding:3px 10px;border-radius:6px;font-family:'DM Mono',monospace;white-space:nowrap;margin-top:3px}
.level-b{background:var(--green-bg);color:var(--green)}
.level-i{background:var(--amber-bg);color:var(--amber)}
.article-title{font-size:17px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;flex:1}
.article-en{font-size:14px;line-height:1.9;color:var(--text);margin-bottom:16px}
.article-en .hl{color:var(--green);font-weight:500;cursor:pointer;border-bottom:1px dashed var(--green2);transition:background .15s}
.article-en .hl:hover{background:var(--green-bg);border-radius:3px;padding:0 2px}
.article-vi{font-size:13px;line-height:1.8;color:var(--muted);background:var(--bg3);border-radius:var(--radius);padding:14px 16px;border-left:3px solid var(--border2);display:none}
.article-vi.show{display:block}
.article-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.art-btn{padding:7px 16px;font-size:12px;border:1px solid var(--border2);border-radius:8px;cursor:pointer;background:transparent;color:var(--muted);transition:all .2s}
.art-btn:hover{background:var(--bg3);color:var(--text)}
.art-btn.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}
/* QUIZ per article */
.art-quiz{margin-top:16px;display:none}
.art-quiz.show{display:block}
.art-quiz-title{font-size:12px;color:var(--muted);margin-bottom:10px;font-family:'DM Mono',monospace}
.aq-item{margin-bottom:14px}
.aq-q{font-size:13px;color:var(--text);margin-bottom:8px;font-weight:500}
.aq-opts{display:flex;flex-direction:column;gap:5px}
.aq-opt{padding:8px 12px;font-size:13px;border:1px solid var(--border);border-radius:8px;cursor:pointer;background:transparent;color:var(--muted);text-align:left;transition:all .15s}
.aq-opt:hover:not(:disabled){background:var(--bg3);color:var(--text)}
.aq-opt.correct{background:var(--green-bg);border-color:var(--green);color:var(--green)}
.aq-opt.wrong{background:rgba(255,92,92,0.08);border-color:var(--red);color:var(--red)}
.tooltip{position:fixed;background:var(--bg4);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);z-index:999;pointer-events:none;max-width:220px;display:none;box-shadow:0 4px 20px rgba(0,0,0,.4)}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">TORQUE<span>_</span>LAB</div>
    <div style="font-size:12px;color:var(--muted);display:none" id="sub">Từ điển chuyên ngành ô tô · by Torque Lab</div>
    <div class="header-stats">
      <div class="hstat">Đã học <b id="hLearn">0</b></div>
      <div class="hstat">Đã lưu <b id="hStar">0</b></div>
      <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="hstat" id="progPct">0%</div>
    </div>
  </div>
</header>

<nav class="nav">
  <div class="nav-inner">
    <button class="nav-tab active" onclick="setMode('dict')">📖 Từ điển</button>
    <button class="nav-tab" onclick="setMode('flash')">🃏 Flashcard</button>
    <button class="nav-tab" onclick="setMode('quiz')">🎯 Quiz</button>
    <button class="nav-tab" onclick="setMode('read')">📚 Bài đọc</button>
    <button class="nav-tab" onclick="setMode('star')">⭐ Đã lưu</button>
  </div>
</nav>

<main class="main">
  <!-- DICT / STAR VIEW -->
  <div id="viewDict">
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Tìm tiếng Anh hoặc tiếng Việt..." oninput="render()"/>
      </div>
    </div>
    <div class="cats" id="catChips"></div>
    <div class="grid" id="wordGrid"></div>
    <div class="pager" id="pager"></div>
  </div>

  <!-- FLASHCARD VIEW -->
  <div id="viewFlash" style="display:none">
    <div class="flash-wrap">
      <div class="flash-counter" id="flashCounter">Thẻ 1 / 0</div>
      <div class="flash-card" id="flashCard" onclick="revealFlash()">
        <div class="flash-front">
          <div class="flash-word" id="flashWord">—</div>
          <div class="flash-cat" id="flashCat">—</div>
          <div class="flash-hint">👆 Click để xem nghĩa</div>
        </div>
        <div class="flash-back">
          <div class="flash-vi" id="flashVi">—</div>
          <div class="flash-cat" id="flashCat2" style="margin-top:8px">—</div>
        </div>
      </div>
      <div class="flash-controls">
        <button class="flash-btn skip" onclick="nextFlash(false)">✗ Chưa thuộc</button>
        <button class="flash-btn know" onclick="nextFlash(true)">✓ Đã thuộc</button>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="flash-btn" onclick="shuffleFlash()">🔀 Xáo bài</button>
        <button class="flash-btn" onclick="resetFlash()">↺ Làm lại</button>
      </div>
    </div>
  </div>

  <!-- QUIZ VIEW -->
  <div id="viewQuiz" style="display:none">
    <div class="quiz-wrap">
      <div class="quiz-meta">
        <span class="quiz-score-disp" id="qScoreDisp">0 đúng / 0 câu</span>
        <div class="quiz-prog"><div class="quiz-prog-fill" id="qProgFill" style="width:0%"></div></div>
        <button class="flash-btn" onclick="startQuiz()" style="padding:6px 12px;font-size:11px">↺ Làm lại</button>
      </div>
      <div id="qArea"></div>
    </div>
  </div>
  <!-- READING VIEW -->
  <div id="viewRead" style="display:none">
    <div id="readList"></div>
  </div>
</main>

// FLASHCARD
let flashDeck=[],flashIdx=0,flashKnow=0;
function initFlash(){
  const pool=getPool();
  flashDeck=[...pool].sort(()=>Math.random()-.5);
  flashIdx=0;flashKnow=0;
  showFlash();
}
function getPool(){
  return words.filter(w=>cat==='Tất cả'||w.cat===cat);
}
function showFlash(){
  if(!flashDeck.length){document.getElementById('flashCard').innerHTML='<div class="flash-front"><div class="flash-word" style="font-size:16px;color:var(--muted)">Không có từ nào trong danh mục này.</div></div>';return;}
  const w=flashDeck[flashIdx%flashDeck.length];
  document.getElementById('flashCard').classList.remove('revealed');
  document.getElementById('flashWord').textContent=w.en;
  document.getElementById('flashCat').textContent=w.cat;
  document.getElementById('flashVi').textContent=w.vi;
  document.getElementById('flashCat2').textContent=w.cat;
  document.getElementById('flashCounter').textContent=`Thẻ ${flashIdx+1} / ${flashDeck.length}  •  Đã thuộc: ${flashKnow}`;
}
function revealFlash(){document.getElementById('flashCard').classList.add('revealed');}
function nextFlash(know){
  if(know){flashKnow++;learned.add(flashDeck[flashIdx%flashDeck.length].en);}
  flashIdx++;
  if(flashIdx>=flashDeck.length){
    document.getElementById('flashCard').innerHTML=`<div class="flash-front"><div class="flash-word" style="font-size:18px">🎉 Xong rồi!</div><div class="flash-cat" style="margin-top:12px">Thuộc ${flashKnow}/${flashDeck.length} từ</div></div>`;
    document.getElementById('flashCounter').textContent='Hoàn thành bộ thẻ!';
    updateStats();return;
  }
  showFlash();updateStats();
}
function shuffleFlash(){flashDeck.sort(()=>Math.random()-.5);flashIdx=0;flashKnow=0;showFlash();}
function resetFlash(){initFlash();}

// QUIZ
let qRight=0,qTotal=0,qWord=null,qAnswered=false;
function startQuiz(){qRight=0;qTotal=0;renderQuiz();}
function renderQuiz(){
  const pool=getPool();
  if(pool.length<4){document.getElementById('qArea').innerHTML='<div class="empty">Cần ít nhất 4 từ trong danh mục.</div>';return;}
  qWord=pool[Math.floor(Math.random()*pool.length)];
  qAnswered=false;
  const wrong=pool.filter(w=>w.en!==qWord.en).sort(()=>Math.random()-.5).slice(0,3);
  const choices=[...wrong,qWord].sort(()=>Math.random()-.5);
  document.getElementById('qScoreDisp').textContent=`${qRight} đúng / ${qTotal} câu`;
  document.getElementById('qProgFill').style.width=qTotal?Math.round(qRight/qTotal*100)+'%':'0%';
  document.getElementById('qArea').innerHTML=`
    <div class="quiz-q">${qWord.en}</div>
    <div class="quiz-cat">${qWord.cat}</div>
    <div class="quiz-choices">${choices.map(c=>`<button class="qchoice" onclick="checkQ(this,'${c.en}','${qWord.en}')">${c.vi}</button>`).join('')}</div>
    <div class="quiz-feedback" id="qFb"></div>
    <button class="quiz-next" id="qNext" onclick="renderQuiz()">Câu tiếp →</button>`;
}
function checkQ(btn,chosen,correct){
  if(qAnswered)return;qAnswered=true;qTotal++;
  document.querySelectorAll('.qchoice').forEach(b=>b.disabled=true);
  if(chosen===correct){btn.classList.add('correct');document.getElementById('qFb').textContent='✓ Chính xác!';learned.add(correct);qRight++;}
  else{btn.classList.add('wrong');document.querySelectorAll('.qchoice').forEach(b=>{if(b.textContent===qWord.vi)b.classList.add('correct');});document.getElementById('qFb').innerHTML=`✗ Sai. Đáp án: <b style="color:var(--green)">${qWord.vi}</b>`;}
  document.getElementById('qNext').style.display='block';
  document.getElementById('qScoreDisp').textContent=`${qRight} đúng / ${qTotal} câu`;
  document.getElementById('qProgFill').style.width=Math.round(qRight/qTotal*100)+'%';
  updateStats();
}

// DICT
function getFiltered(){
  const q=document.getElementById('searchInput')?.value.trim().toLowerCase()||'';
  return words.filter(w=>{
    if(mode==='star'&&!starred.has(w.en))return false;
    if(cat!=='Tất cả'&&w.cat!==cat)return false;
    if(!q)return true;
    return w.en.toLowerCase().includes(q)||w.vi.toLowerCase().includes(q);
  });
}
function render(){
  const filt=getFiltered();
  const pages=Math.max(1,Math.ceil(filt.length/PER));
  if(page>=pages)page=pages-1;
  const slice=filt.slice(page*PER,(page+1)*PER);
  const grid=document.getElementById('wordGrid');
  if(!slice.length){grid.innerHTML='<div class="empty">Không tìm thấy từ nào.</div>';document.getElementById('pager').innerHTML='';return;}
  grid.innerHTML=slice.map(w=>{
    const iL=learned.has(w.en),iS=starred.has(w.en);
    return`<div class="card${iL?' learned':iS?' starred':''}">
      ${iL?'<span class="card-badge badge-l">✓ Thuộc</span>':iS?'<span class="card-badge badge-s">★ Lưu</span>':''}
      <div class="card-en">${w.en}</div>
      <div class="card-vi">${w.vi}</div>
      <span class="card-tag">${w.cat}</span>
      <div class="card-actions">
        <button class="card-btn${iS?' s-active':''}" onclick="toggleStar('${w.en}')">${iS?'★ Saved':'☆ Save'}</button>
        <button class="card-btn${iL?' l-active':''}" onclick="toggleLearn('${w.en}')">${iL?'✓ Thuộc':'Đánh dấu'}</button>
      </div>
    </div>`;
  }).join('');
  let pgr='';
  if(pages>1){pgr=`<button onclick="goP(${page-1})" ${page===0?'disabled':''}>← Trước</button><span>Trang ${page+1}/${pages} · ${filt.length} từ</span><button onclick="goP(${page+1})" ${page===pages-1?'disabled':''}>Tiếp →</button>`;}
  else{pgr=`<span>${filt.length} từ</span>`;}
  document.getElementById('pager').innerHTML=pgr;
}
function goP(p){page=p;render();}
function toggleStar(en){if(starred.has(en))starred.delete(en);else starred.add(en);render();updateStats();}
function toggleLearn(en){if(learned.has(en))learned.delete(en);else learned.add(en);render();updateStats();}
function renderCats(){
  document.getElementById('catChips').innerHTML=CATS.map(c=>`<button class="cat${cat===c?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}
function setCat(c){cat=c;page=0;renderCats();if(mode==='flash')initFlash();else if(mode==='quiz')startQuiz();else render();}
function setMode(m){
  mode=m;page=0;
  document.querySelectorAll('.nav-tab').forEach((t,i)=>{t.classList.toggle('active',['dict','flash','quiz','read','star'].indexOf(m)===i);});
  document.getElementById('viewDict').style.display=(m==='dict'||m==='star')?'':'none';
  document.getElementById('viewFlash').style.display=m==='flash'?'':'none';
  document.getElementById('viewQuiz').style.display=m==='quiz'?'':'none';
  document.getElementById('viewRead').style.display=m==='read'?'':'none';
  if(m==='flash')initFlash();else if(m==='quiz')startQuiz();else if(m==='read')renderRead();else render();
}
function updateStats(){
  const t=words.length,l=learned.size,s=starred.size,pct=Math.round(l/t*100);
  document.getElementById('hLearn').textContent=l;
  document.getElementById('hStar').textContent=s;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progPct').textContent=pct+'%';
}
renderCats();render();updateStats();

  title:'How a 4-Stroke Engine Works',
  en:`The <span class="hl" data-vi="động cơ đốt trong">internal combustion engine</span> is the heart of most vehicles. It operates on a <span class="hl" data-vi="chu kỳ 4 thì">four-stroke cycle</span>: intake, compression, combustion, and exhaust.\n\nDuring the <span class="hl" data-vi="thì nạp">intake stroke</span>, the <span class="hl" data-vi="piston">piston</span> moves downward, drawing a mixture of air and fuel into the <span class="hl" data-vi="xy lanh">cylinder</span> through the open <span class="hl" data-vi="xupap nạp">intake valve</span>.\n\nIn the <span class="hl" data-vi="thì nén">compression stroke</span>, the piston moves back up, compressing the mixture. The <span class="hl" data-vi="tỷ số nén">compression ratio</span> determines how tightly the mixture is squeezed — typically between 8:1 and 12:1 for gasoline engines.\n\nAt the top of the compression stroke, the <span class="hl" data-vi="bugi đánh lửa">spark plug</span> fires, igniting the mixture. The resulting explosion pushes the piston down in the <span class="hl" data-vi="thì nổ (sinh công)">power stroke</span>, which generates <span class="hl" data-vi="mô-men xoắn">torque</span> on the <span class="hl" data-vi="trục khuỷu">crankshaft</span>.\n\nFinally, the <span class="hl" data-vi="thì xả">exhaust stroke</span> pushes burned gases out through the open <span class="hl" data-vi="xupap xả">exhaust valve</span>, completing the cycle.`,
  vi:`Động cơ đốt trong là trái tim của hầu hết các phương tiện. Nó hoạt động theo chu kỳ 4 thì: nạp, nén, nổ và xả.\n\nTrong thì nạp, piston đi xuống, kéo hỗn hợp không khí và nhiên liệu vào xy lanh qua xupap nạp đang mở.\n\nTrong thì nén, piston đi lên nén hỗn hợp lại. Tỷ số nén quyết định mức độ nén — thường từ 8:1 đến 12:1 với động cơ xăng.\n\nĐỉnh hành trình nén, bugi đánh lửa, đốt cháy hỗn hợp. Vụ nổ đẩy piston xuống trong thì nổ, tạo ra mô-men xoắn trên trục khuỷu.\n\nCuối cùng, thì xả đẩy khí cháy ra ngoài qua xupap xả đang mở, hoàn tất chu kỳ.`,
